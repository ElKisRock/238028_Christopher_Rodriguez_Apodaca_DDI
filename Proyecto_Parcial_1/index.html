<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar - Coleccionismo</title>
    <link rel="stylesheet" href="ingresar/ingresar.css">
</head>

<body>
    <!-- Encabezado -->
    <header>
        <h1>Coleccionismo de Figuras de Acción</h1>
    </header>

    <!-- Contenedor principal -->
    <main class="contenedor-ingresar">

        <!-- Imagen principal -->
        <section class="seccion-imagen">
            <img src="ingresar/recursos/Portada-ingresar.png" alt="Portada coleccionismo">
        </section>

        <!-- Sección del formulario -->
        <section class="seccion-formulario">

            <h2>Inicia sesión</h2>

            <!-- Formulario visual -->
            <form class="formulario-ingreso">

                <!-- Campo usuario -->
                <div class="campo">
                    <label for="usuario">Usuario</label>
                    <input type="text" id="usuario" placeholder="Ingresa tu usuario">
                </div>

                <!-- Campo correo -->
                <div class="campo">
                    <label for="correo">Correo electrónico</label>
                    <input type="email" id="correo" placeholder="Ingresa tu correo">
                </div>

                <!-- Campo contraseña -->
                <div class="campo">
                    <label for="contrasena">Contraseña</label>
                    <input type="password" id="contrasena" placeholder="Ingresa tu contraseña">
                </div>

                <!-- Botón ingresar -->
                <div class="campo boton-container">
                    <a href="pagina-inicio/inicio.html" class="boton-ingresar">Ingresar</a>
                </div>

            </form>

        </section>

    </main>

    <!-- Pie de página -->
    <footer>
        <p>Proyecto Parcial - Diseño Digital III</p>
    </footer>

    <script src="ingresar/ingresar.js"></script>
</body>

</html>
