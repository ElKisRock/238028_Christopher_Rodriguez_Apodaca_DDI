<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iniciar Sesión</title>
    <link rel="stylesheet" href="iniciar_sesion/iniciar_sesion.css">
</head>

<body>
    <div class="contenedor-iniciarSesion">
        <img src="iniciar_sesion/recursos/Logo_MHW.webp" class="logo">
        <h1>Monster Hunter Wilds</h1>
        <h2>Iniciar Sesión</h2>

        <!-- Formulario de inicio de sesión -->
        <form id="formularioIniciarSesion">
            <input type="email" id="correo" placeholder="Correo" required>
            <input type="password" id="contrasena" placeholder="Contraseña" required>

            <button type="submit">Entrar</button>
        </form>
        <!-- Botón para ir a registrarse -->
        <button type="button" onclick="location='registro/registro.html'">
            Registrarse
        </button>
    </div>

    <script src="iniciar_sesion/iniciar_sesion.js"></script>
</body>

</html>
