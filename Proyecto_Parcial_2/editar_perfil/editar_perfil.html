<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Editar Perfil</title>
    <link rel="stylesheet" href="editar_perfil.css">
</head>

<body>

    <!-- Contenedor principal para editar perfil -->
    <div class="contenedor-editar">

        <img src="recursos/Logo_MHW.webp" class="logo">

        <h1>Editar Perfil</h1>

        <!-- Formulario para modificar datos del usuario -->
        <form id="formularioEditarPerfil">

            <input type="text" id="nombreCompleto" placeholder="Nombre completo" required>

            <input type="email" id="correo" placeholder="Correo" required>

            <input type="password" id="nuevaContrasena" placeholder="Nueva contraseña (opcional)">

            <p class="texto-fotoPerfil">Cambiar foto de perfil</p>

            <input type="file" id="fotoPerfil" accept="image/*">

            <button type="submit">Guardar Cambios</button>
        </form>

        <!-- Botón para regresar a inicio -->
        <button type="button" id="botonVolver">Volver</button>
    </div>

    <script src="editar_perfil.js"></script>
</body>

</html>
