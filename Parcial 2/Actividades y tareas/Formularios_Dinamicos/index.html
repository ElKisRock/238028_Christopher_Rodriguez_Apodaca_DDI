<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios Dinámicos</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>

<body>
    <form action="">
        <label for="nombre">Nombre</label>
        <input type="text" name="nombre" placeholder="Ingresa el nombre" id="input-txt-nombre">
        <br>
        <label for="apellido">Apellido</label>
        <input type="text" name="apellido" placeholder="Ingresa el Apellido" id="input-txt-apellido">
        <br>
        <label for="cantidad_correos">Ingrese la cantidad de correos que va a ingresar</label>
        <br>
        <input type="number" name="cantidad_correos" id="cantidad_correos" onchange="cambiarNumero(event)">
        <br>
        <div class="contenedor_correos" id="contenedor_correos">
            
        </div>
        <br>
        <button id="boton-guardar">Guardar Datos</button>
    </form>
</body>
<script src="js/script.js"></script>

</html>
